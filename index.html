<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Workout Tracker</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#007AFF">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
:root {
  --primary:#007AFF;
  --bg:#f2f2f7;
  --card:#ffffff;
  --success:#34c759;
  --danger:#ff3b30;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg:#000000;
    --card:#1c1c1e;
  }
}

body {
  font-family:-apple-system,system-ui,sans-serif;
  background:var(--bg);
  margin:0;
  padding:15px;
  direction:rtl;
}

.container {
  max-width:460px;
  margin:auto;
  background:var(--card);
  padding:25px;
  border-radius:26px;
  box-shadow:0 10px 30px rgba(0,0,0,0.15);
  min-height:500px;
}

.container > div {
  animation:fade .25s ease-out;
}

@keyframes fade {
  from { opacity:0; transform:translateY(6px); }
  to { opacity:1; }
}

button, select {
  min-height:48px;
}

.header {
  position:sticky;
  top:0;
  background:var(--card);
  padding-top:10px;
  z-index:5;
  text-align:center;
}

h2 {
  margin:0;
  color:var(--primary);
  font-size:1.4em;
}

.set-info {
  color:#8e8e93;
  font-weight:600;
  font-size:.9em;
}

.picker-group {
  margin-bottom:20px;
}

.picker-label {
  font-weight:bold;
  margin-bottom:8px;
  display:block;
}

select {
  width:100%;
  border-radius:15px;
  border:1px solid #d1d1d6;
  background:#f9f9f9;
  font-size:1.2em;
  padding:0 10px;
  text-align:center;
}

.btn-main {
  width:100%;
  background:var(--primary);
  color:white;
  border:none;
  padding:18px;
  border-radius:16px;
  font-size:1.1em;
  font-weight:bold;
  margin-top:10px;
}

.btn-outline {
  background:#e5e5ea;
  border:none;
  padding:15px;
  width:100%;
  border-radius:16px;
  margin-top:10px;
}

.choice-box {
  display:flex;
  flex-direction:column;
  gap:10px;
}

.back-btn {
  position:absolute;
  top:-5px;
  right:-5px;
  background:none;
  border:none;
  color:var(--primary);
  font-size:1.1em;
  padding:10px;
  font-weight:bold;
}

#summary-area {
  background:#1c1c1e;
  color:#32d74b;
  padding:15px;
  border-radius:12px;
  font-family:monospace;
  font-size:.85em;
  white-space:pre-wrap;
  direction:ltr;
}

.toast {
  position:fixed;
  bottom:25px;
  left:50%;
  transform:translateX(-50%);
  background:#1c1c1e;
  color:white;
  padding:12px 20px;
  border-radius:20px;
  font-size:14px;
  z-index:9999;
}
</style>
</head>

<body>

<div class="container">

<button class="back-btn" id="back" onclick="goBack()" style="display:none;">↩</button>

<div id="ui"></div>

</div>

<script>
/* ---------- Toast ---------- */
function toast(msg) {
  const t=document.createElement("div");
  t.className="toast";
  t.innerText=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),1800);
}

/* ---------- State ---------- */
let state=JSON.parse(localStorage.getItem("workoutState")) || {
  screen:"week", week:1, type:"", rm:100,
  exIdx:0, setIdx:0, log:[], currentEx:null
};

function save() {
  localStorage.setItem("workoutState",JSON.stringify(state));
}

function reset() {
  localStorage.removeItem("workoutState");
  location.reload();
}

/* ---------- UI ---------- */
const ui=document.getElementById("ui");
const backBtn=document.getElementById("back");

function render(html, showBack=true) {
  ui.innerHTML=html;
  backBtn.style.display=showBack ? "block" : "none";
  save();
}

/* ---------- Screens ---------- */
function screenWeek() {
  state.screen="week";
  render(`
    <h2>איזה שבוע?</h2>
    <div class="choice-box">
      <button class="btn-main" onclick="pickWeek(1)">שבוע 1</button>
      <button class="btn-main" onclick="pickWeek(2)">שבוע 2</button>
      <button class="btn-main" onclick="pickWeek(3)">שבוע 3</button>
    </div>
  `,false);
}

function pickWeek(w) {
  state.week=w;
  state.screen="type";
  render(`
    <h2>בחר אימון</h2>
    <div class="choice-box">
      <button class="btn-main" onclick="pickType('A')">A - חזה וכתפיים</button>
      <button class="btn-main" onclick="pickType('B')">B - רגליים וגב</button>
      <button class="btn-main" onclick="pickType('C')">C - כתפיים וגב</button>
    </div>
  `);
}

function pickType(t) {
  state.type=t;
  state.screen="rm";
  render(`
    <h2>מה ה-1RM?</h2>
    <select id="rm">${Array.from({length:41},(_,i)=>100+i*2.5)
      .map(v=>`<option ${v===state.rm?"selected":""}>${v}</option>`).join("")}
    </select>
    <button class="btn-main" onclick="saveRM()">המשך</button>
  `);
}

function saveRM() {
  state.rm=parseFloat(document.getElementById("rm").value);
  finish();
}

/* ---------- Finish ---------- */
function finish() {
  render(`
    <h2>אימון הושלם ✅</h2>
    <div id="summary-area">
אימון שבוע ${state.week}
RM ${state.rm}kg
    </div>
    <button class="btn-main" onclick="copy()">העתק ואפס</button>
  `);
}

function copy() {
  navigator.clipboard.writeText(document.getElementById("summary-area").innerText);
  toast("הועתק");
  reset();
}

/* ---------- Back ---------- */
function goBack() {
  reset();
}

/* ---------- Init ---------- */
screenWeek();
</script>

</body>
</html>
